<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Scene Practice</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #020617;
      color: #e2e8f0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .info {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1;
      max-width: 320px;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.75);
      line-height: 1.5;
    }

    .info strong {
      display: block;
      margin-bottom: 6px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div class="info">
    <strong>Scene Practice</strong>
    This example uses: background, fog, lights, group, children, helper, and traverse.
  </div>

  <canvas></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="scene.js"></script>
</body>
</html>
